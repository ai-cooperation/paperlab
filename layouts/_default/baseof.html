<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Paper Lab{{ end }}</title>

  <meta name="keywords" content="{{ delimit .Site.Params.keywords ", " }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta name="robots" content="index, follow">
  <meta name="google-site-verification" content="f8nXf8xLZvVMg1vrZCZMamLhurkPUdx-pDfRWyjequ4">

  <!-- OG -->
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:site_name" content="Paper Lab">
  <meta property="og:image" content="https://paperlab.cooperation.tw/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="https://paperlab.cooperation.tw/og-image.png">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0B3C5D', light: '#134B6E', dark: '#072A42' },
            secondary: { DEFAULT: '#0F9D8A', light: '#12B89F', dark: '#0A7A6B' },
            accent: { DEFAULT: '#FFC857', dark: '#E6A820' },
            surface: '#F5F7FA',
            tip: '#E8F4F2',
            slate2: '#2C3E50',
          },
          fontFamily: {
            sans: ['"Inter"', '"Noto Sans TC"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'Consolas', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    /* ===== Reading Glasses Skill: 老花眼友善尺寸規格 ===== */
    html { scroll-behavior: smooth; font-size: 22px; }
    body {
      font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
      line-height: 1.7;
      font-weight: 400;
    }

    /* Prose styles for article content — Reading Glasses compliant */
    .prose { max-width: 720px; }
    .prose h2 { font-size: 1.45rem; font-weight: 700; color: #0B3C5D; margin-top: 2.5rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #E8F4F2; }
    .prose h3 { font-size: 1.2rem; font-weight: 600; color: #134B6E; margin-top: 2rem; margin-bottom: 0.75rem; }
    .prose p { line-height: 1.8; margin-bottom: 1.25rem; color: #374151; }
    .prose a { color: #0F9D8A; text-decoration: underline; text-underline-offset: 3px; }
    .prose a:hover { color: #12B89F; }
    .prose ul, .prose ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
    .prose li { line-height: 1.8; margin-bottom: 0.6rem; color: #374151; }
    .prose blockquote { border-left: 4px solid #0F9D8A; background: #F5F7FA; padding: 1.25rem 1.5rem; margin: 1.5rem 0; border-radius: 0 8px 8px 0; }
    .prose blockquote p { color: #5A6B7A; margin-bottom: 0; }
    .prose code { background: #F3F4F6; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.85em; color: #0B3C5D; }
    .prose pre { background: #1A1A1A; color: #E5E7EB; padding: 1.5rem; border-radius: 8px; overflow-x: auto; margin: 1.5rem 0; font-size: 0.82rem; }
    .prose pre code { background: none; padding: 0; color: inherit; }
    .prose strong { color: #0B3C5D; }
    .prose hr { border-color: #E5E7EB; margin: 2rem 0; }

    /* Tables in prose */
    .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
    .prose thead { background: #0B3C5D; color: #fff; }
    .prose th { padding: 0.75rem 1rem; text-align: left; font-weight: 600; white-space: nowrap; }
    .prose td { padding: 0.75rem 1rem; border-bottom: 1px solid #E5E7EB; color: #374151; }
    .prose tbody tr:hover { background: #F5F7FA; }
    .prose table code { font-size: 0.85em; }
    @media (max-width: 640px) {
      .prose table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .prose th, .prose td { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
    }

    /* Tip box */
    .tip-box { background: #E8F4F2; border-left: 4px solid #0F9D8A; border-radius: 0 8px 8px 0; padding: 1rem 1.5rem; margin: 1.5rem 0; }
  </style>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E39KCD13Z5"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-E39KCD13Z5');</script>

  {{ block "head" . }}{{ end }}

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5N58oOpOi7Nio9hkGE3oZa7sp8vAcY9M",
      authDomain: "paperlab-3ce7e.firebaseapp.com",
      projectId: "paperlab-3ce7e",
      storageBucket: "paperlab-3ce7e.firebasestorage.app",
      messagingSenderId: "97297143010",
      appId: "1:97297143010:web:d9c335667c038d3fbe7abb"
    };

    // 只有 config 填入後才初始化
    if (firebaseConfig.apiKey) {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      window.paperLabAuth = {
        login: async function() {
          try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            // 存用戶資料到 Firestore
            await setDoc(doc(db, "users", user.uid), {
              email: user.email,
              name: user.displayName,
              photo: user.photoURL,
              last_login: serverTimestamp(),
              source_page: window.location.pathname,
              role: "free"
            }, { merge: true });
          } catch (e) {
            console.error("Login error:", e);
          }
        },
        logout: function() { signOut(auth); }
      };

      onAuthStateChanged(auth, function(user) {
        const btn = document.getElementById('auth-btn');
        const avatar = document.getElementById('auth-avatar');
        if (!btn) return;
        if (user) {
          btn.textContent = user.displayName ? user.displayName.split(' ')[0] : '已登入';
          btn.onclick = window.paperLabAuth.logout;
          if (avatar && user.photoURL) {
            avatar.src = user.photoURL;
            avatar.classList.remove('hidden');
          }
        } else {
          btn.textContent = 'Google 登入';
          btn.onclick = window.paperLabAuth.login;
          if (avatar) avatar.classList.add('hidden');
        }
      });
    }
  </script>

  {{- if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Paper Lab",
    "description": "論文方法學 — 寫論文 找方法",
    "url": "https://paperlab.cooperation.tw/"
  }
  </script>
  {{- end }}
</head>
<body class="bg-surface text-gray-800 antialiased">

  <!-- Navigation -->
  <nav class="bg-primary shadow-lg sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-2 text-white font-bold text-lg tracking-tight hover:opacity-90 transition">
          <span class="text-accent text-2xl font-black">P</span>
          <span>Paper Lab</span>

        <!-- Desktop menu -->

          {{ range .Site.Menus.main }}

          {{ end }}
          <!-- Google login -->
          <div class="flex items-center gap-2">
            <img id="auth-avatar" class="hidden w-8 h-8 rounded-full" alt="">
            <button id="auth-btn" onclick="" class="text-accent hover:text-accent-dark font-semibold text-lg transition">Google 登入</button>
          </div>
        </div>
        <!-- Mobile menu button -->
        <button id="mobile-menu-btn" class="md:hidden text-white p-2" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
      <!-- Mobile menu -->
      <div id="mobile-menu" class="hidden md:hidden pb-4">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="block text-white/80 hover:text-accent py-2 px-2 font-medium">{{ .Name }}</a>
        {{ end }}
      </div>
    </div>
  </nav>

  <main>

  </main>

  <!-- Footer -->
  <footer class="bg-primary-dark text-white/60 py-12">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-lg">
          <span class="text-white font-bold">Paper Lab</span>
          <span class="text-white/30 mx-2">|</span>
          <span>寫論文 找方法</span>
          <span class="text-white/30 mx-2">|</span>
          <a href="mailto:aicooperation.tw@gmail.com?subject=論文方法學 預約諮詢&body=您好，我想預約論文方法學諮詢。%0A%0A我的研究領域：%0A目前卡在哪個階段：%0A想諮詢的問題：" class="text-accent hover:text-accent-dark transition">預約諮詢</a>
        </div>
        <div class="text-lg">
          &copy; {{ now.Year }} cooperation.tw
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
