baseURL = "https://paperlab.cooperation.tw/"
languageCode = "zh-tw"
title = "論文方法學 — 寫論文 找方法 | Paper Lab"
paginate = 20

enableRobotsTXT = true
buildDrafts = false
buildFuture = true
buildExpired = false

[params]
  env = "production"
  title = "Paper Lab"
  description = "論文方法學 — 寫論文 找方法 — 12 個階段帶你從零到發表"
  keywords = ["寫論文找方法", "論文方法學", "AI 寫論文", "AI 論文工具", "research gap"]
  author = "陳重光"

# SEO
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]

# Menu
[menu]
  [[menu.main]]
    identifier = "phases"
    name = "論文方法學"
    url = "/phases/"
    weight = 10
  [[menu.main]]
    identifier = "tools"
    name = "必學技能"
    url = "/tools/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "關於"
    url = "/about/"
    weight = 30

# Markup
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
