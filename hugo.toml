baseURL = "https://paperlab.cooperation.tw/"
languageCode = "zh-tw"
title = "Paper Lab — 寫論文，找方法"
theme = "PaperMod"
paginate = 20

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  title = "Paper Lab"
  description = "AI 論文方法學 — 11 步帶你從零到發表"
  keywords = ["寫論文找方法", "論文方法學", "AI 寫論文", "AI 論文工具", "research gap"]
  author = "陳重光"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "寫論文，找方法"
    Content = """
AI 論文方法學 — 11 個階段，帶你從零到發表。

每個階段都告訴你：**下一步做什麼、用什麼工具、怎麼用 AI 做到位。**
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ai-cooperation/paperlab"

[params.assets]
  favicon = "/favicon.ico"

[params.label]
  text = "Paper Lab"

# SEO
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Menu
[menu]
  [[menu.main]]
    identifier = "phases"
    name = "11 Phase 方法學"
    url = "/phases/"
    weight = 10
  [[menu.main]]
    identifier = "tools"
    name = "必學工具"
    url = "/tools/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "關於"
    url = "/about/"
    weight = 30

# Markup
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
