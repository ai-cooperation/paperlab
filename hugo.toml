baseURL = "https://paperlab.cooperation.tw/"
languageCode = "zh-TW"
title = "Paper Lab — 寫論文，找方法"
theme = "PaperMod"

[params]
  env = "production"
  description = "AI 論文方法學 — 11 步帶你從零到發表"
  author = "Cooperation.TW"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "light"

  [params.homeInfoParams]
    Title = "Paper Lab"
    Content = "AI 論文方法學 — 從概念到投稿的完整流程展示"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:aicooperation.tw@gmail.com"

[menu]
  [[menu.main]]
    identifier = "cases"
    name = "案例演練"
    url = "/cases/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "關於"
    url = "/about/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
